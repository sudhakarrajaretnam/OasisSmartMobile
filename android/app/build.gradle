plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "com.google.gms.google-services"
    id "dev.flutter.flutter-gradle-plugin"
}

dependencies {
    implementation platform('com.google.firebase:firebase-bom:32.2.2')
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.firebase:firebase-appcheck'
    implementation 'com.google.firebase:firebase-appcheck-debug'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
def requiredReleaseSigningKeys = ['keyAlias', 'keyPassword', 'storeFile', 'storePassword']
def missingReleaseSigningKeys = requiredReleaseSigningKeys.findAll { !keystoreProperties[it] }
def releaseKeystoreFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
def hasReleaseKeystore = missingReleaseSigningKeys.isEmpty() && releaseKeystoreFile?.exists()
def isReleaseTaskRequested = gradle.startParameter.taskNames.any { it.toLowerCase().contains("release") }

if (isReleaseTaskRequested && !hasReleaseKeystore) {
    def signingIssues = []

    if (!keystorePropertiesFile.exists()) {
        signingIssues << "android/key.properties is missing"
    }
    if (!missingReleaseSigningKeys.isEmpty()) {
        signingIssues << "missing properties: ${missingReleaseSigningKeys.join(', ')}"
    }
    if (keystoreProperties['storeFile'] && !releaseKeystoreFile?.exists()) {
        signingIssues << "keystore file not found: ${releaseKeystoreFile}"
    }

    throw new IllegalStateException(
        "Release signing is not configured correctly. ${signingIssues.join('; ')}. " +
        "Add the configured upload keystore to android/key.properties before building a release bundle."
    )
}

android {
    namespace = "com.oasis.oasissmart"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.oasis.oasissmart"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            if (hasReleaseKeystore) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source = "../.."
}
